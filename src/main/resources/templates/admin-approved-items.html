<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Approved Listings | Campus Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/admin/dashboard}">🎓 Campus Marketplace</a></div>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/moderate}">Moderate</a>
        <a th:href="@{/admin/items}">Listings</a>
        <a th:href="@{/admin/reports}">Reports</a>
        <a th:href="@{/admin/categories}">Categories</a>
        <a th:href="@{/admin/users}">Users</a>
        <span class="nav-user" sec:authentication="name"></span>
        <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="container">

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <div class="page-header">
        <div>
            <h1>Active Listings</h1>
            <p class="page-subtitle">UC7 — Send price-modification feedback to sellers</p>
        </div>
    </div>

    <div th:if="${items.empty}" class="empty-state">
        <span class="empty-icon">📋</span>
        <p>No approved listings at this time.</p>
    </div>

    <div class="table-wrap" th:unless="${items.empty}">
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Seller</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Send Price Feedback</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td>
                        <div class="fw-bold" th:text="${item.name}">Name</div>
                        <div class="text-muted" th:text="${#strings.abbreviate(item.description,60)}"></div>
                    </td>
                    <td th:text="${item.seller.name}">Seller</td>
                    <td th:text="${item.category.name}">Category</td>
                    <td class="fw-bold" th:text="'₹' + ${item.price}">₹0</td>
                    <td>
                        <!-- UC7: Price feedback form -->
                        <form th:action="@{/admin/item/{id}/price-feedback(id=${item.id})}"
                              method="post"
                              style="display:inline-flex; gap:.4rem; align-items:center; flex-wrap:wrap;">
                            <input type="text" name="feedback"
                                   class="form-control" style="min-width:200px; font-size:.85rem;"
                                   placeholder="e.g. Price too high, please reduce to ₹500"
                                   required/>
                            <button type="submit" class="btn btn-warning btn-sm">
                                💬 Send Feedback
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
